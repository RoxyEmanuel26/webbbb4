<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Native Advertisement</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }
    #ad-container {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="ad-container"></div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const widgetId = params.get('widgetId');

      if (!widgetId) return;

      const container = document.getElementById('ad-container');

      // Buat elemen target untuk Adsterra
      const adTarget = document.createElement('div');
      adTarget.id = 'container-' + widgetId;
      container.appendChild(adTarget);

      // Muat script Adsterra
      const script = document.createElement('script');
      script.type = 'text/javascript';
      script.src = 'https://glamournakedemployee.com/' + widgetId + '/invoke.js';
      script.async = true;
      script.setAttribute('data-cfasync', 'false');
      container.appendChild(script);

      // ─── Pengiriman tinggi yang efisien ────────────────────────────────────
      // Sebelumnya: setInterval 200ms × 21 = 42 postMessage per halaman (boros)
      // Sekarang: ResizeObserver (event-driven) + 4 fallback timeout saja

      let lastHeight = 0;

      const sendHeight = () => {
        const h = document.body.offsetHeight || document.documentElement.scrollHeight;
        // Hanya kirim jika tinggi benar-benar berubah (hindari kiriman duplikat)
        if (h > 0 && h !== lastHeight) {
          lastHeight = h;
          window.parent.postMessage({
            type: 'adsterra-native-resize',
            widgetId: widgetId,
            height: h + 8 // buffer kecil agar tidak terpotong
          }, '*');
        }
      };

      // 1. MutationObserver: pantau perubahan DOM (gambar dimuat, iklan render, dsb.)
      const mo = new MutationObserver(sendHeight);
      mo.observe(document.body, { childList: true, subtree: true, attributes: true });

      // 2. ResizeObserver: pantau perubahan ukuran elemen (lebih efisien dari polling)
      if (window.ResizeObserver) {
        const ro = new ResizeObserver(sendHeight);
        ro.observe(document.body);
      }

      // 3. Fallback: hanya 4 checkpoint (bukan 21) untuk menangkap render akhir
      window.addEventListener('load', sendHeight);
      [300, 800, 1500, 3000].forEach(function(ms) {
        setTimeout(sendHeight, ms);
      });

    })();
  </script>
</body>
</html>
