<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Advertisement</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const key = params.get('key');
      const w = params.get('w');
      const h = params.get('h');
      
      if (key && w && h) {
        // Request storage access (for 3rd party cookie targeting – boosts CPM)
        if (document.requestStorageAccess) {
          document.requestStorageAccess().catch(function() {
            // Silently fail – ad will still load without cookie targeting
          });
        }

        window.atOptions = {
          'key': key,
          'format': 'iframe',
          'height': parseInt(h, 10),
          'width': parseInt(w, 10),
          'params': {}
        };
        
        const script = document.createElement('script');
        script.type = 'text/javascript';
        // data-cfasync="false" ensures Cloudflare does NOT delay/defer this script
        script.setAttribute('data-cfasync', 'false');
        script.src = 'https://glamournakedemployee.com/' + key + '/invoke.js';
        script.async = false; // synchronous for immediate render – better viewability score
        document.body.appendChild(script);
      }
    })();
  </script>
</body>
</html>
